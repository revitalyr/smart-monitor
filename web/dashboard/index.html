<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #4a5568;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.inactive {
            background: #f56565;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #718096;
            font-weight: 500;
        }
        
        .metric-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #2d3748;
        }
        
        .video-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        #video {
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 10px;
            background: #000;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 15px;
        }
        
        .alert {
            background: #fed7d7;
            border: 1px solid #fc8181;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            color: #742a2a;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Smart Monitor</h1>
            <div class="status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Loading...</span>
            </div>
        </header>
        
        <div class="video-container">
            <h2>📹 Live Video Stream</h2>
            <video id="video" autoplay playsinline muted></video>
            <div class="controls">
                <button id="startStream">Start Stream</button>
                <button id="stopStream" disabled>Stop Stream</button>
                <button id="snapshot">📸 Snapshot</button>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <h2>📊 Motion Metrics</h2>
                <div class="metric">
                    <span class="metric-label">Motion Events</span>
                    <span class="metric-value" id="motionEvents">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Motion Level</span>
                    <span class="metric-value" id="motionLevel">0.00</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Last Motion</span>
                    <span class="metric-value" id="lastMotion">Never</span>
                </div>
                <div class="chart-container">
                    <canvas id="motionChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>📹 Camera Status</h2>
                <div class="metric">
                    <span class="metric-label">Camera Active</span>
                    <span class="metric-value" id="cameraActive">No</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Frames Processed</span>
                    <span class="metric-value" id="framesProcessed">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Uptime</span>
                    <span class="metric-value" id="uptime">0s</span>
                </div>
                <div class="chart-container">
                    <canvas id="frameChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>🔔 Alerts</h2>
            <div id="alerts">
                <div class="loading">No alerts yet...</div>
            </div>
        </div>
    </div>

    <script>
        class SmartMonitorDashboard {
            constructor() {
                this.peerConnection = null;
                this.isStreaming = false;
                this.motionData = [];
                this.frameData = [];
                this.maxDataPoints = 20;
                
                this.initCharts();
                this.initControls();
                this.startMonitoring();
            }
            
            initCharts() {
                // Motion chart
                const motionCtx = document.getElementById('motionChart').getContext('2d');
                this.motionChart = new Chart(motionCtx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Motion Level',
                            data: [],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 1
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
                
                // Frame chart
                const frameCtx = document.getElementById('frameChart').getContext('2d');
                this.frameChart = new Chart(frameCtx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Frames/sec',
                            data: [],
                            borderColor: '#48bb78',
                            backgroundColor: 'rgba(72, 187, 120, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            }
            
            initControls() {
                document.getElementById('startStream').addEventListener('click', () => this.startStream());
                document.getElementById('stopStream').addEventListener('click', () => this.stopStream());
                document.getElementById('snapshot').addEventListener('click', () => this.takeSnapshot());
            }
            
            async startStream() {
                try {
                    // Create WebRTC peer connection
                    this.peerConnection = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    
                    // Handle incoming streams
                    this.peerConnection.ontrack = (event) => {
                        const video = document.getElementById('video');
                        video.srcObject = event.streams[0];
                    };
                    
                    // Get offer from server
                    const response = await fetch('/webrtc/offer');
                    const offer = await response.text();
                    
                    // Set remote description
                    await this.peerConnection.setRemoteDescription({
                        type: 'offer',
                        sdp: offer
                    });
                    
                    // Create answer
                    const answer = await this.peerConnection.createAnswer();
                    await this.peerConnection.setLocalDescription(answer);
                    
                    // Send answer to server
                    await fetch('/webrtc/answer', {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: answer.sdp
                    });
                    
                    this.isStreaming = true;
                    document.getElementById('startStream').disabled = true;
                    document.getElementById('stopStream').disabled = false;
                    
                    this.addAlert('Video stream started successfully', 'success');
                    
                } catch (error) {
                    console.error('Failed to start stream:', error);
                    this.addAlert('Failed to start video stream', 'error');
                }
            }
            
            stopStream() {
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                
                const video = document.getElementById('video');
                video.srcObject = null;
                
                this.isStreaming = false;
                document.getElementById('startStream').disabled = false;
                document.getElementById('stopStream').disabled = true;
                
                this.addAlert('Video stream stopped', 'info');
            }
            
            takeSnapshot() {
                const video = document.getElementById('video');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Download snapshot
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `snapshot-${Date.now()}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
                
                this.addAlert('Snapshot captured', 'success');
            }
            
            async startMonitoring() {
                setInterval(async () => {
                    await this.updateMetrics();
                }, 1000);
            }
            
            async updateMetrics() {
                try {
                    const response = await fetch('/metrics');
                    const data = await response.json();
                    
                    // Update UI
                    document.getElementById('motionEvents').textContent = data.motion_events;
                    document.getElementById('motionLevel').textContent = data.motion_level.toFixed(2);
                    document.getElementById('lastMotion').textContent = data.last_motion_time || 'Never';
                    document.getElementById('cameraActive').textContent = data.camera_active ? 'Yes' : 'No';
                    document.getElementById('framesProcessed').textContent = data.frames_processed;
                    document.getElementById('uptime').textContent = data.uptime;
                    
                    // Update status
                    const indicator = document.getElementById('statusIndicator');
                    const statusText = document.getElementById('statusText');
                    
                    if (data.camera_active) {
                        indicator.classList.remove('inactive');
                        statusText.textContent = 'System Active';
                    } else {
                        indicator.classList.add('inactive');
                        statusText.textContent = 'Camera Inactive';
                    }
                    
                    // Update charts
                    this.updateCharts(data);
                    
                    // Check for motion alerts
                    if (data.motion_level > 0.5) {
                        this.addAlert(`High motion detected: ${data.motion_level.toFixed(2)}`, 'warning');
                    }
                    
                } catch (error) {
                    console.error('Failed to update metrics:', error);
                    document.getElementById('statusText').textContent = 'Connection Error';
                }
            }
            
            updateCharts(data) {
                const now = new Date().toLocaleTimeString();
                
                // Update motion chart
                this.motionData.push(data.motion_level);
                if (this.motionData.length > this.maxDataPoints) {
                    this.motionData.shift();
                }
                
                this.motionChart.data.labels = Array(this.motionData.length).fill('').map((_, i) => 
                    i === 0 || i === this.motionData.length - 1 ? now : ''
                );
                this.motionChart.data.datasets[0].data = this.motionData;
                this.motionChart.update('none');
                
                // Update frame chart (simplified - just showing frame count growth)
                this.frameData.push(data.frames_processed);
                if (this.frameData.length > this.maxDataPoints) {
                    this.frameData.shift();
                }
                
                this.frameChart.data.labels = Array(this.frameData.length).fill('').map((_, i) => 
                    i === 0 || i === this.frameData.length - 1 ? now : ''
                );
                this.frameChart.data.datasets[0].data = this.frameData;
                this.frameChart.update('none');
            }
            
            addAlert(message, type = 'info') {
                const alertsContainer = document.getElementById('alerts');
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert';
                alertDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                
                // Remove loading message if present
                const loading = alertsContainer.querySelector('.loading');
                if (loading) {
                    loading.remove();
                }
                
                alertsContainer.insertBefore(alertDiv, alertsContainer.firstChild);
                
                // Keep only last 5 alerts
                while (alertsContainer.children.length > 5) {
                    alertsContainer.removeChild(alertsContainer.lastChild);
                }
                
                // Auto remove after 10 seconds
                setTimeout(() => {
                    if (alertDiv.parentNode) {
                        alertDiv.parentNode.removeChild(alertDiv);
                    }
                }, 10000);
            }
        }
        
        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new SmartMonitorDashboard();
        });
    </script>
</body>
</html>
