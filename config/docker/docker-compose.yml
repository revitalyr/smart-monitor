version: '3.8'

services:
  smart-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: smart-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "10000-10010:10000-10010/udp"
    devices:
      - "/dev/video0:/dev/video0"
    environment:
      - GST_DEBUG=3
      - RUST_LOG=info
    volumes:
      - ./config:/etc/smart-monitor
      - ./logs:/var/log/smart-monitor
      - ./data:/var/lib/smart-monitor
    networks:
      - smart-monitor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy for HTTPS
  nginx:
    image: nginx:alpine
    container_name: smart-monitor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ../web/dashboard:/var/www/smart-monitor:ro
    depends_on:
      - smart-monitor
    networks:
      - smart-monitor-network
    profiles:
      - https

networks:
  smart-monitor-network:
    driver: bridge
