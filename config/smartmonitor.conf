# Smart Monitor Configuration File
# /etc/smartmonitor.conf

# Camera Configuration
device=/dev/video0
width=640
height=480
fps=30
mock_mode=false

# HTTP Server Configuration
port=8080
max_connections=10
enable_cors=true
enable_tls=false

# Motion Detection Configuration
motion_threshold=20
adaptive_threshold=0.01
min_motion_pixels=100
motion_timeout=5

# Audio Configuration
audio_device=default
audio_sample_rate=44100
audio_channels=1
voice_threshold=0.1
enable_audio=false

# Sensor Configuration
i2c_device=/dev/i2c-1
i2c_address=0x48
sensor_poll_interval=1000
enable_sensors=false

# Logging Configuration
debug=false
log_file=/var/log/smartmonitor.log
syslog=false
log_level=INFO

# Performance Configuration
buffer_count=4
thread_priority=50
memory_limit_mb=100

# Security Configuration
enable_auth=false
auth_token=
allowed_ips=127.0.0.1,::1

# Advanced Features
enable_webrtc=false
enable_audio_processing=false
enable_sleep_detection=false
enable_cloud_storage=false

# System Integration
systemd_service=true
udev_rules=true
auto_start=true
