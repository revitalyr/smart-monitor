# Smart Monitor Configuration File

[video]
# Camera device path
device=/dev/video0
# Video resolution
width=640
height=480
# Frame rate
fps=30

[motion]
# Motion detection threshold (0-255)
threshold=20
# Minimum motion ratio to trigger event (0.0-1.0)
motion_ratio_threshold=0.05

[network]
# HTTP server port
http_port=8080
# WebRTC port range (for firewall configuration)
webrtc_port_min=10000
webrtc_port_max=20000

[logging]
# Log level: error, warn, info, debug, trace
level=info
# Log file path (empty for stdout)
file=/var/log/smart-monitor.log

[features]
# Enable WebRTC streaming
enable_webrtc=true
# Enable motion detection
enable_motion=true
# Enable camera capture
enable_camera=true

[security]
# Enable HTTPS (requires certificates)
enable_https=false
# Certificate file path
cert_file=/etc/ssl/certs/smart-monitor.crt
# Key file path
key_file=/etc/ssl/private/smart-monitor.key
